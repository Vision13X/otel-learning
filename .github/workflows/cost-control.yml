# Cost Control Pipeline
#
# THE financial guardrail for the entire project. ALL other workflows call this.
#
# Responsibilities:
#   1. PRE-DEPLOY VALIDATION (called by deploy.yml):
#      - Check for orphaned resources (nightly destroy failed?)
#      - Fetch REAL pricing from AWS Pricing API for what we're about to deploy
#      - Calculate: MTD + (real hourly cost × 16 hrs) >= $70? → BLOCK
#   2. NIGHTLY DESTROY (1 AM UTC cron):
#      - Full destroy of all compute
#   3. EMERGENCY DESTROY:
#      - If MTD >= $70, kill everything
#
# Monthly hard cap: $70. No exceptions.

name: Cost Control

on:
  schedule:
    # 1 AM IST = 7:30 PM UTC (19:30 UTC)
    - cron: '30 19 * * *'

  # Called by deploy.yml before creating anything
  workflow_call:
    inputs:
      instance_type:
        description: 'EC2 instance type being deployed'
        required: true
        type: string
      node_count:
        description: 'Number of nodes'
        required: true
        type: number
    outputs:
      approved:
        description: "Whether deployment is approved"
        value: ${{ jobs.validate.outputs.approved }}

  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - full-destroy
      instance_type:
        description: 'Instance type to price check (for manual testing)'
        required: false
        default: 't3.large'
        type: string
      node_count:
        description: 'Node count to price check'
        required: false
        default: '2'
        type: string

env:
  CLUSTER_NAME: otel-learning
  REGION: us-east-1
  MONTHLY_HARD_CAP: 70
  # EKS control plane cost is fixed: $0.10/hr
  EKS_HOURLY: "0.10"
  # Hours per day (deploy in morning → destroy at 1 AM)
  HOURS_PER_DAY: 16

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.final-verdict.outputs.approved }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # GATE 1: Check for orphaned resources
      # If nightly destroy failed, resources are ALREADY running and costing money.
      # Block all new deploys until the leak is fixed.
      - name: Check for orphaned resources
        run: |
          echo "=== GATE 1: Orphan Check ==="
          FAILED=false

          # EKS cluster
          CLUSTER=$(aws eks describe-cluster --name $CLUSTER_NAME --region $REGION 2>&1 || true)
          if echo "$CLUSTER" | grep -q "ResourceNotFoundException"; then
            echo "✅ No existing EKS cluster"
          else
            echo "❌ EKS cluster '$CLUSTER_NAME' exists — nightly destroy FAILED"
            FAILED=true
          fi

          # EC2 instances tagged with our cluster
          INSTANCES=$(aws ec2 describe-instances \
            --filters "Name=instance-state-name,Values=running,pending" \
                      "Name=tag:eksctl.cluster.k8s.io/v1alpha1/cluster-name,Values=$CLUSTER_NAME" \
            --query 'Reservations[*].Instances[*].InstanceId' \
            --output text 2>/dev/null)
          if [ -n "$INSTANCES" ]; then
            echo "❌ EC2 instances from previous deploy still running: $INSTANCES"
            FAILED=true
          else
            echo "✅ No orphaned EC2 instances"
          fi

          # NAT gateways ($0.045/hr each — silent money drain)
          NATS=$(aws ec2 describe-nat-gateways \
            --filter "Name=state,Values=available,pending" \
            --query 'NatGateways[*].NatGatewayId' \
            --output text 2>/dev/null)
          if [ -n "$NATS" ]; then
            echo "❌ NAT gateways still alive: $NATS (\$0.045/hr each!)"
            FAILED=true
          else
            echo "✅ No orphaned NAT gateways"
          fi

          # Load balancers
          ELBS=$(aws elb describe-load-balancers --query 'LoadBalancerDescriptions[*].LoadBalancerName' --output text 2>/dev/null)
          if [ -n "$ELBS" ]; then
            echo "❌ Classic LBs still exist: $ELBS"
            FAILED=true
          else
            echo "✅ No orphaned load balancers"
          fi

          if [ "$FAILED" == "true" ]; then
            echo ""
            echo "❌ BLOCKED: Orphaned resources detected. Nightly destroy failed."
            echo "   Run 'Destroy EKS (Manual)' first. Investigate why nightly cron didn't work."
            exit 1
          fi

      # GATE 2: Fetch REAL pricing from AWS Pricing API
      # No hardcoded costs. Pulls live on-demand pricing for the exact instance type.
      - name: Fetch instance pricing from AWS
        id: pricing
        run: |
          echo "=== GATE 2: Real Pricing Check ==="

          INSTANCE_TYPE="${{ inputs.instance_type || 't3.large' }}"
          NODE_COUNT="${{ inputs.node_count || '2' }}"

          echo "Instance type: $INSTANCE_TYPE"
          echo "Node count: $NODE_COUNT"

          # AWS Pricing API is only available in us-east-1 and ap-south-1
          HOURLY_PRICE=$(aws pricing get-products \
            --service-code AmazonEC2 \
            --region us-east-1 \
            --filters \
              "Type=TERM_MATCH,Field=instanceType,Value=$INSTANCE_TYPE" \
              "Type=TERM_MATCH,Field=location,Value=US East (N. Virginia)" \
              "Type=TERM_MATCH,Field=operatingSystem,Value=Linux" \
              "Type=TERM_MATCH,Field=tenancy,Value=Shared" \
              "Type=TERM_MATCH,Field=preInstalledSw,Value=NA" \
              "Type=TERM_MATCH,Field=capacitystatus,Value=Used" \
            --query 'PriceList[0]' \
            --output text 2>/dev/null | python3 -c "
          import sys, json
          try:
              data = json.loads(sys.stdin.read())
              terms = data['terms']['OnDemand']
              for term in terms.values():
                  for price_dim in term['priceDimensions'].values():
                      price = price_dim['pricePerUnit']['USD']
                      if float(price) > 0:
                          print(price)
                          sys.exit(0)
          except:
              pass
          print('0')
          ")

          # Fallback: if pricing API fails, use a conservative estimate
          if [ -z "$HOURLY_PRICE" ] || [ "$HOURLY_PRICE" == "0" ]; then
            echo "⚠️  Could not fetch price from API. Using conservative fallback."
            # Fallback lookup table for common types
            case $INSTANCE_TYPE in
              t3.micro)   HOURLY_PRICE="0.0104" ;;
              t3.small)   HOURLY_PRICE="0.0208" ;;
              t3.medium)  HOURLY_PRICE="0.0416" ;;
              t3.large)   HOURLY_PRICE="0.0832" ;;
              t3.xlarge)  HOURLY_PRICE="0.1664" ;;
              m5.large)   HOURLY_PRICE="0.0960" ;;
              m5.xlarge)  HOURLY_PRICE="0.1920" ;;
              c5.large)   HOURLY_PRICE="0.0850" ;;
              r5.large)   HOURLY_PRICE="0.1260" ;;
              x1.16xlarge) HOURLY_PRICE="6.669" ;;
              x1.32xlarge) HOURLY_PRICE="13.338" ;;
              p3.2xlarge) HOURLY_PRICE="3.060" ;;
              *)          HOURLY_PRICE="1.00" ;; # Unknown type → assume $1/hr (conservative)
            esac
            echo "   Fallback price for $INSTANCE_TYPE: \$$HOURLY_PRICE/hr"
          fi

          echo "hourly_price=$HOURLY_PRICE" >> $GITHUB_OUTPUT
          echo "node_count=$NODE_COUNT" >> $GITHUB_OUTPUT
          echo ""
          echo "💰 $INSTANCE_TYPE on-demand price: \$$HOURLY_PRICE/hr per instance"

      # GATE 3: Calculate projected daily cost and check against budget
      - name: Budget projection
        id: budget
        run: |
          echo "=== GATE 3: Budget Projection ==="

          START_DATE=$(date +%Y-%m-01)
          END_DATE=$(date +%Y-%m-%d)

          MTD_SPEND=$(aws ce get-cost-and-usage \
            --time-period Start=$START_DATE,End=$END_DATE \
            --granularity MONTHLY \
            --metrics UnblendedCost \
            --query 'ResultsByTime[0].Total.UnblendedCost.Amount' \
            --output text)

          if [ -z "$MTD_SPEND" ] || [ "$MTD_SPEND" == "None" ]; then
            MTD_SPEND="0.00"
          fi

          HOURLY_PRICE="${{ steps.pricing.outputs.hourly_price }}"
          NODE_COUNT="${{ steps.pricing.outputs.node_count }}"

          # Total hourly cost = (node_price × node_count) + EKS control plane
          TOTAL_HOURLY=$(echo "$HOURLY_PRICE * $NODE_COUNT + $EKS_HOURLY" | bc -l)

          # Daily cost = hourly × hours_per_day (16 hrs, morning to 1 AM destroy)
          DAILY_COST=$(echo "$TOTAL_HOURLY * $HOURS_PER_DAY" | bc -l)

          # Projected: MTD + one day
          PROJECTED=$(echo "$MTD_SPEND + $DAILY_COST" | bc -l)

          echo "============================================"
          echo "  Instance type:           ${{ inputs.instance_type || 't3.large' }}"
          echo "  Node count:              $NODE_COUNT"
          echo "  Hourly (per node):       \$$HOURLY_PRICE"
          echo "  EKS control plane:       \$$EKS_HOURLY/hr"
          echo "  Total hourly:            \$$(printf '%.4f' $TOTAL_HOURLY)"
          echo "  Daily (${HOURS_PER_DAY}hrs):           \$$(printf '%.2f' $DAILY_COST)"
          echo "  ─────────────────────────────────────"
          echo "  Month-to-date spend:     \$$MTD_SPEND"
          echo "  + Today's deployment:    \$$(printf '%.2f' $DAILY_COST)"
          echo "  = Projected total:       \$$(printf '%.2f' $PROJECTED)"
          echo "  Hard cap:                \$$MONTHLY_HARD_CAP"
          echo "============================================"

          # Check 1: Would this deploy push us over?
          if (( $(echo "$PROJECTED >= $MONTHLY_HARD_CAP" | bc -l) )); then
            echo ""
            echo "❌ DEPLOY BLOCKED: today's deploy would push total to \$$(printf '%.2f' $PROJECTED)"
            echo "   Hard cap is \$$MONTHLY_HARD_CAP. Cannot proceed."
            exit 1
          fi

          # Check 2: Are we already over? (shouldn't happen but safety net)
          if (( $(echo "$MTD_SPEND >= $MONTHLY_HARD_CAP" | bc -l) )); then
            echo "🚨 ALREADY OVER \$$MONTHLY_HARD_CAP — blocked and triggering destroy"
            exit 1
          fi

          # Check 3: Sanity — is this deploy absurdly expensive? (> $20/day = probably wrong instance)
          if (( $(echo "$DAILY_COST > 20" | bc -l) )); then
            echo ""
            echo "❌ DEPLOY BLOCKED: daily cost \$$(printf '%.2f' $DAILY_COST) is suspiciously high"
            echo "   Are you sure about instance type '${{ inputs.instance_type || 't3.large' }}'?"
            echo "   This would burn through the budget in $(echo "$MONTHLY_HARD_CAP / $DAILY_COST" | bc) days."
            exit 1
          fi

          echo ""
          echo "✅ APPROVED: Deploy will cost ~\$$(printf '%.2f' $DAILY_COST) today. Within budget."

      - name: Final verdict
        id: final-verdict
        run: |
          echo "approved=true" >> $GITHUB_OUTPUT
          echo "✅ All gates passed. Deploy is authorized."

  # NIGHTLY FULL DESTROY — 1 AM UTC
  nightly-destroy:
    if: github.event_name == 'schedule' || github.event.inputs.action == 'full-destroy'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install eksctl
        run: |
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz"
          tar -xzf eksctl_Linux_amd64.tar.gz -C /tmp && sudo mv /tmp/eksctl /usr/local/bin

      - name: Destroy cluster
        run: |
          echo "🌙 Nightly destroy: killing everything"
          if eksctl get cluster --name $CLUSTER_NAME --region $REGION 2>/dev/null; then
            eksctl delete cluster --name $CLUSTER_NAME --region $REGION --wait
            echo "✅ Cluster destroyed. Cost: \$0/hr."
          else
            echo "No cluster found. Already clean."
          fi

  # EMERGENCY DESTROY — triggered when budget is breached
  emergency-destroy:
    if: github.event.inputs.action == 'full-destroy'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install eksctl
        run: |
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz"
          tar -xzf eksctl_Linux_amd64.tar.gz -C /tmp && sudo mv /tmp/eksctl /usr/local/bin

      - name: Emergency destroy
        run: |
          echo "🚨 EMERGENCY DESTROY"
          eksctl delete cluster --name $CLUSTER_NAME --region $REGION --wait || echo "Cluster not found"
          echo "Done. All compute terminated."
