# Deploy EKS Cluster + OTel Demo
#
# ALL cost/budget/orphan validation lives in cost-control.yml.
# This workflow ONLY deploys. It calls cost-control first as a gate.
#
# Flow: cost-control (validate) → deploy (create + install)
#
# Time: ~18-25 min (EKS creation is the bottleneck)
# Cost: determined by cost-control.yml from live AWS pricing

name: Deploy OTel Demo to EKS

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'k8s/**'

env:
  CLUSTER_NAME: otel-learning
  REGION: us-east-1
  NODE_INSTANCE_TYPE: t3.large
  NODE_COUNT: 2
  NAMESPACE: otel-demo

jobs:
  # Gate: cost-control does ALL validation
  # - Orphan check (nightly destroy failed?)
  # - Live pricing from AWS Pricing API
  # - Budget projection (MTD + today's cost >= $70?)
  # - Sanity check (> $20/day = wrong instance type)
  cost-gate:
    uses: ./.github/workflows/cost-gate.yml
    with:
      instance_type: t3.large
      node_count: 2
    secrets: inherit

  deploy:
    needs: cost-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install eksctl
        run: |
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz"
          tar -xzf eksctl_Linux_amd64.tar.gz -C /tmp && sudo mv /tmp/eksctl /usr/local/bin

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      # Create EKS cluster from scratch
      # After nightly destroy, no cluster exists. We rebuild each morning.
      - name: Create EKS cluster
        run: |
          if eksctl get cluster --name $CLUSTER_NAME --region $REGION 2>/dev/null; then
            echo "Cluster already exists, skipping creation"
          else
            echo "Creating cluster (~15-20 min)..."
            eksctl create cluster \
              --name $CLUSTER_NAME \
              --region $REGION \
              --node-type $NODE_INSTANCE_TYPE \
              --nodes $NODE_COUNT \
              --managed \
              --with-oidc
          fi

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $REGION

      - name: Verify cluster
        run: |
          kubectl get nodes
          kubectl cluster-info

      # Grant vision-admin access so you can use kubectl from CloudShell
      - name: Grant CloudShell access
        run: |
          aws eks create-access-entry \
            --cluster-name $CLUSTER_NAME \
            --principal-arn arn:aws:iam::835050295936:user/vision-admin \
            --type STANDARD \
            --region $REGION 2>/dev/null || echo "Access entry exists"

          aws eks associate-access-policy \
            --cluster-name $CLUSTER_NAME \
            --principal-arn arn:aws:iam::835050295936:user/vision-admin \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster \
            --region $REGION 2>/dev/null || echo "Policy already associated"

      - name: Create namespace
        run: |
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

      - name: Install OTel Demo via Helm
        run: |
          helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo update

          # Get the correct values schema for the chart
          # The frontendProxy component key may vary by chart version
          helm upgrade --install otel-demo open-telemetry/opentelemetry-demo \
            --namespace $NAMESPACE \
            --timeout 10m \
            --wait

      - name: Get access URLs
        run: |
          echo "Waiting for LoadBalancer DNS..."
          sleep 30
          
          # Find the frontendproxy service (name may vary by chart version)
          PROXY_SVC=$(kubectl get svc -n $NAMESPACE -o name | grep -i "frontend-proxy\|frontendproxy" | head -1)
          
          if [ -n "$PROXY_SVC" ]; then
            # Patch it to LoadBalancer type for external access
            kubectl patch $PROXY_SVC -n $NAMESPACE -p '{"spec": {"type": "LoadBalancer"}}'
            echo "Patched $PROXY_SVC to LoadBalancer. Waiting for DNS..."
            sleep 30
            SVC_NAME=$(echo $PROXY_SVC | sed 's|service/||')
            FRONTEND_URL=$(kubectl get svc $SVC_NAME -n $NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          fi

          if [ -z "$FRONTEND_URL" ]; then
            echo "LoadBalancer not assigned yet. Use kubectl port-forward to access:"
            echo "  kubectl port-forward svc/<frontend-proxy-svc> 8080:8080 -n $NAMESPACE"
          else
            echo "============================================"
            echo "  OTel Demo Frontend: http://$FRONTEND_URL:8080"
            echo "  Grafana:            http://$FRONTEND_URL:8080/grafana/"
            echo "  Jaeger:             http://$FRONTEND_URL:8080/jaeger/ui"
            echo "============================================"
          fi

      - name: Verify deployment
        run: |
          echo "Pod status:"
          kubectl get pods -n $NAMESPACE
          echo ""
          echo "Services:"
          kubectl get svc -n $NAMESPACE
