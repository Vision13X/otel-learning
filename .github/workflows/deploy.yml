# Deploy EKS Cluster + OTel Demo
# Trigger: manual (workflow_dispatch) or push to main
# What it does:
#   1. Checks budget (blocks if projected monthly spend + worst-case week >= $70)
#   2. Creates EKS cluster from scratch (nightly destroy means no cluster exists in morning)
#   3. Installs the OTel Demo via Helm
#   4. Outputs access URLs
#
# Time: ~18-25 min (EKS cluster creation is the bottleneck — "pee time + beverage")
# Cost: ~$0.10/hr control plane + ~$0.08/hr per node (2 nodes)

name: Deploy OTel Demo to EKS

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'k8s/**'

env:
  CLUSTER_NAME: otel-learning
  REGION: us-east-1
  NODE_INSTANCE_TYPE: t3.large
  NODE_COUNT: 2
  NAMESPACE: otel-demo

jobs:
  # Gate: check budget before spending a dime
  cost-check:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Logic: if month-to-date spend >= $70, block. That's it.
      # Nightly destroy ensures we can't silently accumulate.
      - name: Budget gate
        run: |
          START_DATE=$(date +%Y-%m-01)
          END_DATE=$(date +%Y-%m-%d)

          MTD_SPEND=$(aws ce get-cost-and-usage \
            --time-period Start=$START_DATE,End=$END_DATE \
            --granularity MONTHLY \
            --metrics UnblendedCost \
            --query 'ResultsByTime[0].Total.UnblendedCost.Amount' \
            --output text)

          if [ -z "$MTD_SPEND" ] || [ "$MTD_SPEND" == "None" ]; then
            MTD_SPEND="0.00"
          fi

          echo "Month-to-date spend: \$$MTD_SPEND"
          echo "Hard cap: \$70"

          if (( $(echo "$MTD_SPEND >= 70" | bc -l) )); then
            echo "❌ DEPLOY BLOCKED: monthly spend \$$MTD_SPEND has hit the \$70 cap"
            exit 1
          fi

          echo "✅ Budget OK (\$$MTD_SPEND < \$70) — proceeding with deploy"

  deploy:
    needs: cost-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Install tools: eksctl, kubectl, helm
      - name: Install eksctl
        run: |
          ARCH=amd64
          PLATFORM=$(uname -s)_$ARCH
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_$PLATFORM.tar.gz"
          tar -xzf eksctl_$PLATFORM.tar.gz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      # Create EKS cluster from scratch
      # After nightly destroy, no cluster exists. We rebuild each morning.
      # Takes ~15-20 min. eksctl creates via CloudFormation:
      #   - VPC with public + private subnets across 2 AZs
      #   - Internet Gateway + NAT Gateway
      #   - EKS control plane (managed by AWS)
      #   - Node group: 2x t3.large EC2 instances
      #   - IAM roles for control plane and nodes
      #   - Security groups
      - name: Create EKS cluster
        run: |
          if eksctl get cluster --name $CLUSTER_NAME --region $REGION 2>/dev/null; then
            echo "Cluster $CLUSTER_NAME already exists, skipping creation"
          else
            echo "Creating cluster from scratch (~15-20 min)..."
            eksctl create cluster \
              --name $CLUSTER_NAME \
              --region $REGION \
              --node-type $NODE_INSTANCE_TYPE \
              --nodes $NODE_COUNT \
              --managed \
              --with-oidc
          fi

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $REGION

      - name: Verify cluster
        run: |
          kubectl get nodes
          kubectl cluster-info

      # Namespace = logical boundary in K8s. Keeps our stuff separate from system stuff.
      - name: Create namespace
        run: |
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

      # Helm = K8s package manager. The OTel Demo chart defines all 15 services
      # + collector + Prometheus + Grafana as K8s resources.
      # "upgrade --install" = install if not present, upgrade if it is (idempotent)
      - name: Install OTel Demo via Helm
        run: |
          helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo update
          helm upgrade --install otel-demo open-telemetry/opentelemetry-demo \
            --namespace $NAMESPACE \
            --set components.frontendProxy.service.type=LoadBalancer \
            --timeout 10m \
            --wait

      # LoadBalancer service type tells K8s to provision an AWS ELB.
      # This is your stable access point (DNS name, not ephemeral IP).
      - name: Get access URLs
        run: |
          echo "Waiting for LoadBalancer DNS to be assigned..."
          sleep 30
          FRONTEND_URL=$(kubectl get svc otel-demo-frontendproxy -n $NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "============================================"
          echo "  OTel Demo Frontend: http://$FRONTEND_URL:8080"
          echo "  Grafana:            http://$FRONTEND_URL:8080/grafana/"
          echo "  Jaeger:             http://$FRONTEND_URL:8080/jaeger/ui"
          echo "============================================"

      - name: Verify deployment
        run: |
          echo "Pod status:"
          kubectl get pods -n $NAMESPACE
          echo ""
          echo "Services:"
          kubectl get svc -n $NAMESPACE
