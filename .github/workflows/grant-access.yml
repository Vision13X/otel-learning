# Grant vigne-admin access to EKS cluster
# Run once after cluster creation to allow CloudShell access.
#
# Why this is needed: EKS grants cluster access only to the IAM identity
# that created it. The pipeline (kiro-deploy) created the cluster, so only
# kiro-deploy can access it. This adds vigne-admin to the access list.

name: Grant Cluster Access

on:
  workflow_dispatch:
    inputs:
      aws_account_id:
        description: 'Your AWS Account ID'
        required: true
        type: string

env:
  CLUSTER_NAME: otel-learning
  REGION: us-east-1

jobs:
  grant-access:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install tools
        run: |
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz"
          tar -xzf eksctl_Linux_amd64.tar.gz -C /tmp && sudo mv /tmp/eksctl /usr/local/bin
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $REGION

      # This creates an access entry for vigne-admin with cluster admin rights
      - name: Grant vigne-admin cluster access
        run: |
          ACCOUNT_ID="${{ inputs.aws_account_id }}"

          # Create access entry for vigne-admin
          aws eks create-access-entry \
            --cluster-name $CLUSTER_NAME \
            --principal-arn arn:aws:iam::${ACCOUNT_ID}:user/vigne-admin \
            --type STANDARD \
            --region $REGION || echo "Access entry may already exist"

          # Associate admin policy
          aws eks associate-access-policy \
            --cluster-name $CLUSTER_NAME \
            --principal-arn arn:aws:iam::${ACCOUNT_ID}:user/vigne-admin \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster \
            --region $REGION || echo "Policy may already be associated"

          echo "✅ vigne-admin now has cluster admin access"
          echo "   Run in CloudShell: aws eks update-kubeconfig --name $CLUSTER_NAME --region $REGION"
          echo "   Then: kubectl get nodes"
