# Destroy EKS Cluster + All Resources
# Trigger: manual only (you don't accidentally destroy things)
# What it does:
#   1. Deletes the Helm release (OTel Demo)
#   2. Deletes the EKS cluster (and all associated CloudFormation stacks)
#   3. Cleans up the LoadBalancer (AWS ELB)
#
# Time: ~10-15 min (CloudFormation stack deletion)
# After this: $0 cost. Nothing running.

name: Destroy OTel Demo + EKS

on:
  workflow_dispatch:  # Manual trigger only — never automatic

env:
  CLUSTER_NAME: otel-learning
  REGION: us-east-1
  NAMESPACE: otel-demo

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install eksctl
        run: |
          ARCH=amd64
          PLATFORM=$(uname -s)_$ARCH
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_$PLATFORM.tar.gz"
          tar -xzf eksctl_$PLATFORM.tar.gz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      # Connect to the cluster before deleting resources inside it
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $REGION

      # Step 1: Uninstall Helm release first
      # This removes all K8s resources (pods, services, configmaps) cleanly.
      # Important to do BEFORE deleting the cluster — otherwise the LoadBalancer
      # (AWS ELB) gets orphaned and keeps costing money.
      - name: Uninstall OTel Demo
        run: |
          helm uninstall otel-demo --namespace $NAMESPACE || echo "Release not found, skipping"

      # Step 2: Wait for LoadBalancer cleanup
      # When Helm removes the LoadBalancer service, AWS needs time to
      # deprovision the ELB. If we delete the cluster too fast, the ELB
      # gets orphaned (still running, still billing).
      - name: Wait for LB cleanup
        run: |
          echo "Waiting 60s for AWS to clean up LoadBalancer..."
          sleep 60

      # Step 3: Delete the entire cluster
      # eksctl deletes everything it created: node group, VPC, subnets,
      # NAT gateway, IAM roles, security groups — all via CloudFormation.
      - name: Delete EKS cluster
        run: |
          eksctl delete cluster --name $CLUSTER_NAME --region $REGION --wait
