# Manual Destroy — use this if you want to tear down mid-day
# The nightly cron (cost-control.yml) handles automatic destroy at 1 AM UTC.
# This is for "I'm done for the day early" or "something went wrong, kill it all."

name: Destroy EKS (Manual)

on:
  workflow_dispatch:  # Manual trigger only

env:
  CLUSTER_NAME: otel-learning
  REGION: us-east-1

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install eksctl
        run: |
          ARCH=amd64
          PLATFORM=$(uname -s)_$ARCH
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_$PLATFORM.tar.gz"
          tar -xzf eksctl_$PLATFORM.tar.gz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin

      - name: Destroy cluster
        run: |
          if eksctl get cluster --name $CLUSTER_NAME --region $REGION 2>/dev/null; then
            echo "Destroying cluster $CLUSTER_NAME..."
            eksctl delete cluster --name $CLUSTER_NAME --region $REGION --wait
            echo "✅ Done. Cost is now $0/hr."
          else
            echo "Cluster doesn't exist. Nothing to destroy."
          fi
